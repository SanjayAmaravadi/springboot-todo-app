<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Application</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Custom CSS-->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
<div class="container main-container">
    <div class="todo-card">

        <!-- Header -->
        <div class="text-center">
            <h1 class="app-title">
                <i class="bi bi-check2-square"></i>
                Todo Application
            </h1>
            <p class="app-subtitle">
                Organize your daily tasks efficiently
            </p>
        </div>

        <!-- Stats -->
        <div class="row mb-4 text-center">
            <div class="col-md-6 mb-3">
                <div class="stats-box">
                    <div class="stats-number" th:text="${#lists.size(tasks)}">0</div>
                    <div>Total Tasks</div>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="stats-box">
                    <div class="stats-number"
                         th:text="${tasks.?[completed].size()}">0</div>
                    <div>Completed</div>
                </div>
            </div>
        </div>

        <!-- Form -->
        <form action="/tasks" method="POST" class="row g-3 mb-4">
            <div class="col-md-9">
                <input  type="text" name="title"
                        class="form-control form-control-lg task-input"
                        placeholder="Enter your task..." required>
            </div>

            <div class="col-md-3">
                <button type="submit" class="btn btn-primary btn-lg add-btn">
                    <i class="bi bi-plus-circle"></i> Add Task
                </button>
            </div>
        </form>

        <!-- Empty State -->
        <div th:if="${#lists.isEmpty(tasks)}" class="empty-state">
            <i class="bi bi-inbox" style="font-size: 60px;"></i>
            <h4 class="mt-3">No Tasks Available</h4>
            <p>Add your first task to get started.</p>
        </div>

        <!-- Task List -->
        <div th:unless="${#lists.isEmpty(tasks)}">
            <th:block th:each="task : ${tasks}">
                <div class="task-item d-flex justify-content-between align-items-center">
                    <div>
                        <span class="task-title" th:classappend="${task.completed} ? 'completed-task'" th:text="${task.title}">
                            Task Title
                        </span>
                        <div class="mt-2">
                            <span th:if="${task.completed}" class="badge bg-success">
                                Completed
                            </span>
                            <span th:unless="${task.completed}" class="badge bg-warning text-dark">
                                Pending
                            </span>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <!-- Toggle Task (PUT Request) -->
                        <form th:action="@{/tasks/{id}(id=${task.id})}" method="POST">
                            <!-- Convert POST -> PUT -->
                            <input type="hidden" name="_method" value="PUT"/>
                            <button type="submit" class="btn btn-outline-light action-btn">
                                <i class="bi bi-check-circle"></i>
                            </button>
                        </form>
                        <!-- Delete Task (DELETE Request) -->
                        <form th:action="@{/tasks/{id}(id=${task.id})}" method="POST">
                            <!-- Convert POST -> DELETE -->
                            <input type="hidden" name="_method" value="DELETE"/>
                            <button type="submit" class="btn btn-outline-danger action-btn">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </th:block>

        </div>

    </div>

</div>

</body>
</html>
